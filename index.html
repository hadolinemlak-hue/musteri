<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#ff7a00" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="format-detection" content="telephone=no" />
  <title>HADOLİN CRM</title>

  <style>
    :root{
      --o:#ff7a00;
      --o2:#e66a00;
      --bg:#141423;
      --bg2:#1d1d31;
      --card:#23233a;
      --line:#3a3a52;
      --txt:#fff;
      --muted:#a7b0c2;
      --ok:#10b981;
      --warn:#f59e0b;
      --bad:#ef4444;
      --blue:#3b82f6;
    }

    *{
      box-sizing:border-box;
    }

    html,body{
      width:100%;
      max-width:100%;
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--txt);
      font-family:Inter,Segoe UI,Arial,sans-serif;
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }

    body{
      min-height:100dvh;
    }

    button,input,select,textarea{font:inherit}
    a{color:inherit;text-decoration:none}

    .app{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100dvh;
    }

    .side{
      background:linear-gradient(180deg,#1a1a2e,#171729);
      border-right:1px solid var(--line);
      padding:18px;
      position:sticky;
      top:0;
      height:100dvh;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      padding-top:calc(18px + env(safe-area-inset-top));
      padding-bottom:calc(28px + env(safe-area-inset-bottom));
      z-index:25;
    }

    .brand{
      font-size:24px;
      font-weight:800;
      letter-spacing:.3px;
      line-height:1.2;
    }

    .subtitle{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
      line-height:1.4;
    }

    .nav{
      margin-top:18px;
      display:grid;
      gap:8px;
      padding-bottom:calc(16px + env(safe-area-inset-bottom));
    }

    .nav button{
      width:100%;
      padding:13px 14px;
      text-align:left;
      border-radius:14px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--txt);
      cursor:pointer;
      min-height:46px;
    }

    .nav button:hover,
    .nav button.active{
      background:linear-gradient(135deg,var(--o),var(--o2));
      border-color:transparent;
    }

    .main{
      padding:24px;
      min-width:0;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .top h1{
      margin:0;
      font-size:30px;
      line-height:1.2;
      min-width:0;
    }

    .toolbar,.row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      padding:11px 14px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      min-height:44px;
    }

    .btn:hover{filter:brightness(1.05)}

    .p{background:linear-gradient(135deg,var(--o),var(--o2));color:#fff}
    .s{background:#2a2a44;border:1px solid var(--line);color:#fff}
    .g{background:var(--ok);color:#fff}
    .r{background:var(--bad);color:#fff}
    .b{background:var(--blue);color:#fff}

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
      gap:12px;
      margin-bottom:18px;
    }

    .box,.card,.panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      min-width:0;
    }

    .stat{
      font-size:34px;
      color:var(--o);
      font-weight:800;
      line-height:1.1;
    }

    .muted{color:var(--muted)}
    .small{font-size:12px;color:var(--muted)}

    .filters{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:10px;
      margin-bottom:16px;
    }

    .filters .full{grid-column:1/-1}

    input,select,textarea{
      width:100%;
      background:#151526;
      border:1px solid var(--line);
      color:#fff;
      border-radius:12px;
      padding:11px 12px;
      min-height:44px;
    }

    textarea{
      resize:vertical;
      min-height:96px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:12px;
    }

    .card h3{
      margin:0 0 8px;
      line-height:1.3;
      word-break:break-word;
    }

    .cardTop{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      line-height:1.2;
      white-space:nowrap;
    }

    .ok{color:var(--ok);border-color:var(--ok)}
    .warn{color:var(--warn);border-color:var(--warn)}
    .bad{color:var(--bad);border-color:var(--bad)}
    .blue{color:var(--blue);border-color:var(--blue)}

    .price{
      color:var(--o);
      font-size:24px;
      font-weight:800;
      margin-top:12px;
      line-height:1.2;
      word-break:break-word;
    }

    .stack{display:grid;gap:8px}

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--line);
    }

    .empty{
      padding:50px 16px;
      text-align:center;
      color:var(--muted);
    }

    .modal,.sheet,.lock{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      align-items:center;
      justify-content:center;
      padding:14px;
      z-index:30;
    }

    .modal.show,.sheet.show,.lock.show{
      display:flex;
    }

    .modalIn,.sheetIn,.lockIn{
      width:min(1080px,100%);
      max-height:92dvh;
      overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      -webkit-overflow-scrolling:touch;
    }

    .lockIn{width:min(420px,100%)}

    .form{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
    }

    .full{grid-column:1/-1}

    label{
      display:block;
      margin-bottom:5px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .hidden{display:none!important}

    .score{
      height:10px;
      background:#111;
      border-radius:999px;
      overflow:hidden;
    }

    .fill{height:100%}
    .high{background:var(--ok)}
    .mid{background:var(--warn)}
    .low{background:var(--bad)}

    .kanban{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
    }

    .deal{
      background:#171729;
      border:1px solid var(--line);
      padding:10px;
      border-radius:12px;
      margin-bottom:10px;
    }

    .historyItem,.taskItem{
      background:#171729;
      border:1px solid var(--line);
      padding:12px;
      border-radius:12px;
    }

    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .toastWrap{
      position:fixed;
      top:calc(16px + env(safe-area-inset-top));
      right:16px;
      display:grid;
      gap:8px;
      z-index:60;
      max-width:min(360px, calc(100vw - 32px));
    }

    .toast{
      background:var(--card);
      border:1px solid var(--line);
      border-left:4px solid var(--o);
      padding:12px 14px;
      border-radius:12px;
      min-width:260px;
      max-width:100%;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      word-break:break-word;
    }

    .mobileBar{display:none}
    .menuOverlay{display:none}

    @media (max-width:900px){
      .app{
        grid-template-columns:1fr;
        min-height:100dvh;
      }

      .side{
        position:fixed;
        left:0;
        top:0;
        width:86vw;
        max-width:320px;
        height:100dvh;
        transform:translateX(-100%);
        transition:transform .28s ease;
        box-shadow:12px 0 30px rgba(0,0,0,.35);
        display:block;
        z-index:25;
        border-right:1px solid var(--line);
      }

      .side.open{
        transform:translateX(0);
      }

      .menuOverlay.show{
        display:block;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.45);
        z-index:24;
      }

      .main{
        padding:14px 14px calc(20px + env(safe-area-inset-bottom));
      }

      .mobileBar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        position:sticky;
        top:0;
        z-index:12;
        background:rgba(20,20,35,.92);
        backdrop-filter:blur(10px);
        padding:calc(10px + env(safe-area-inset-top)) 0 10px;
        margin-bottom:10px;
      }

      .mobileBar .btn{
        min-width:44px;
        min-height:44px;
        padding:10px 12px;
        flex-shrink:0;
      }

      .mobileBar .brand{
        font-size:18px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }

      .top{
        gap:12px;
        margin-bottom:14px;
      }

      .top h1{
        font-size:22px;
        line-height:1.25;
        width:100%;
      }

      .toolbar,.row{
        width:100%;
        gap:8px;
      }

      .toolbar .btn,.row .btn{
        min-height:44px;
      }

      .stats,.filters,.grid,.two,.kanban{
        grid-template-columns:1fr;
      }

      .cardTop{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        flex-direction:column;
        align-items:stretch;
      }

      .actions .btn{
        width:100%;
      }

      .modal,.sheet,.lock{
        padding:0;
      }

      .modalIn,.sheetIn,.lockIn{
        width:100%;
        max-width:none;
        max-height:100dvh;
        min-height:100dvh;
        border-radius:0;
        padding:16px;
        padding-top:calc(16px + env(safe-area-inset-top));
        padding-bottom:calc(16px + env(safe-area-inset-bottom));
      }

      .form{
        grid-template-columns:1fr;
      }

      .toastWrap{
        left:12px;
        right:12px;
        top:calc(12px + env(safe-area-inset-top));
        max-width:none;
      }

      .toast{
        min-width:0;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <!-- Buradan sonrası body -->
</body>
</html>
