<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta
  <meta name="theme-color" content="#ff7a00" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>HADOLİN CRM</title>

  <style>
    :root{
      --o:#ff7a00;
      --o2:#e66a00;
      --bg:#141423;
      --bg2:#1d1d31;
      --card:#23233a;
      --line:#3a3a52;
      --txt:#fff;
      --muted:#a7b0c2;
      --ok:#10b981;
      --warn:#f59e0b;
      --bad:#ef4444;
      --blue:#3b82f6;
    }

    *{box-sizing:border-box}

    html,body{
      margin:0;
      padding:0;
      background:var(--bg);
      color:var(--txt);
      font-family:Inter,Segoe UI,Arial,sans-serif;
      min-height:100%;
      overflow-x:hidden;
      -webkit-text-size-adjust:100%;
    }

    body{
      min-height:100dvh;
    }

    button,input,select,textarea{font:inherit}
    a{color:inherit;text-decoration:none}

    .app{
      display:grid;
      grid-template-columns:260px 1fr;
      min-height:100dvh;
    }

    .side{
      background:linear-gradient(180deg,#1a1a2e,#171729);
      border-right:1px solid var(--line);
      padding:18px;
      position:sticky;
      top:0;
      height:100dvh;
      overflow-y:auto;
      overflow-x:hidden;
      -webkit-overflow-scrolling:touch;
      padding-top:calc(18px + env(safe-area-inset-top));
      padding-bottom:calc(28px + env(safe-area-inset-bottom));
      z-index:25;
    }

    .brand{
      font-size:24px;
      font-weight:800;
      letter-spacing:.3px;
      line-height:1.2;
    }

    .subtitle{
      color:var(--muted);
      font-size:12px;
      margin-top:6px;
      line-height:1.4;
    }

    .nav{
      margin-top:18px;
      display:grid;
      gap:8px;
      padding-bottom:calc(16px + env(safe-area-inset-bottom));
    }

    .nav button{
      width:100%;
      padding:13px 14px;
      text-align:left;
      border-radius:14px;
      border:1px solid var(--line);
      background:transparent;
      color:var(--txt);
      cursor:pointer;
      min-height:46px;
    }

    .nav button:hover,
    .nav button.active{
      background:linear-gradient(135deg,var(--o),var(--o2));
      border-color:transparent;
    }

    .main{
      padding:24px;
      min-width:0;
    }

    .top{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .top h1{
      margin:0;
      font-size:30px;
      line-height:1.2;
      min-width:0;
    }

    .toolbar,.row{
      display:flex;
      gap:8px;
      align-items:center;
      flex-wrap:wrap;
    }

    .btn{
      padding:11px 14px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      min-height:44px;
    }

    .btn:hover{filter:brightness(1.05)}

    .p{background:linear-gradient(135deg,var(--o),var(--o2));color:#fff}
    .s{background:#2a2a44;border:1px solid var(--line);color:#fff}
    .g{background:var(--ok);color:#fff}
    .r{background:var(--bad);color:#fff}
    .b{background:var(--blue);color:#fff}

    .stats{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(190px,1fr));
      gap:12px;
      margin-bottom:18px;
    }

    .box,.card,.panel{
      background:var(--card);
      border:1px solid var(--line);
      border-radius:18px;
      padding:16px;
      min-width:0;
    }

    .stat{
      font-size:34px;
      color:var(--o);
      font-weight:800;
      line-height:1.1;
    }

    .muted{color:var(--muted)}
    .small{font-size:12px;color:var(--muted)}

    .filters{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
      gap:10px;
      margin-bottom:16px;
    }

    .filters .full{grid-column:1/-1}

    input,select,textarea{
      width:100%;
      background:#151526;
      border:1px solid var(--line);
      color:#fff;
      border-radius:12px;
      padding:11px 12px;
      min-height:44px;
    }

    textarea{
      resize:vertical;
      min-height:96px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
      gap:12px;
    }

    .card h3{
      margin:0 0 8px;
      line-height:1.3;
      word-break:break-word;
    }

    .cardTop{
      display:flex;
      justify-content:space-between;
      gap:8px;
      align-items:flex-start;
    }

    .tag{
      display:inline-flex;
      align-items:center;
      gap:6px;
      border:1px solid var(--line);
      border-radius:999px;
      padding:5px 10px;
      font-size:12px;
      line-height:1.2;
      white-space:nowrap;
    }

    .ok{color:var(--ok);border-color:var(--ok)}
    .warn{color:var(--warn);border-color:var(--warn)}
    .bad{color:var(--bad);border-color:var(--bad)}
    .blue{color:var(--blue);border-color:var(--blue)}

    .price{
      color:var(--o);
      font-size:24px;
      font-weight:800;
      margin-top:12px;
      line-height:1.2;
      word-break:break-word;
    }

    .stack{display:grid;gap:8px}

    .actions{
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      margin-top:14px;
      padding-top:14px;
      border-top:1px solid var(--line);
    }

    .empty{
      padding:50px 16px;
      text-align:center;
      color:var(--muted);
    }

    .modal,.sheet,.lock{
      position:fixed;
      inset:0;
      background:rgba(0,0,0,.7);
      display:none;
      align-items:center;
      justify-content:center;
      padding:14px;
      z-index:30;
    }

    .modal.show,.sheet.show,.lock.show{
      display:flex;
    }

    .modalIn,.sheetIn,.lockIn{
      width:min(1080px,100%);
      max-height:92dvh;
      overflow:auto;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:20px;
      padding:18px;
      -webkit-overflow-scrolling:touch;
    }

    .lockIn{width:min(420px,100%)}

    .form{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
    }

    .full{grid-column:1/-1}

    label{
      display:block;
      margin-bottom:5px;
      font-size:12px;
      color:var(--muted);
      line-height:1.4;
    }

    .hidden{display:none!important}

    .score{
      height:10px;
      background:#111;
      border-radius:999px;
      overflow:hidden;
    }

    .fill{height:100%}
    .high{background:var(--ok)}
    .mid{background:var(--warn)}
    .low{background:var(--bad)}

    .kanban{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
      gap:10px;
    }

    .deal{
      background:#171729;
      border:1px solid var(--line);
      padding:10px;
      border-radius:12px;
      margin-bottom:10px;
    }

    .historyItem,.taskItem{
      background:#171729;
      border:1px solid var(--line);
      padding:12px;
      border-radius:12px;
    }

    .two{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:10px;
    }

    .toastWrap{
      position:fixed;
      top:calc(16px + env(safe-area-inset-top));
      right:16px;
      display:grid;
      gap:8px;
      z-index:60;
      max-width:min(360px, calc(100vw - 32px));
    }

    .toast{
      background:var(--card);
      border:1px solid var(--line);
      border-left:4px solid var(--o);
      padding:12px 14px;
      border-radius:12px;
      min-width:260px;
      max-width:100%;
      box-shadow:0 12px 30px rgba(0,0,0,.35);
      word-break:break-word;
    }

    .mobileBar{display:none}
    .menuOverlay{display:none}

    @media (max-width:900px){
      .app{
        grid-template-columns:1fr;
        min-height:100dvh;
      }

      .side{
        position:fixed;
        left:0;
        top:0;
        width:86vw;
        max-width:320px;
        height:100dvh;
        transform:translateX(-100%);
        transition:transform .28s ease;
        box-shadow:12px 0 30px rgba(0,0,0,.35);
        display:block;
        z-index:25;
        border-right:1px solid var(--line);
      }

      .side.open{
        transform:translateX(0);
      }

      .menuOverlay.show{
        display:block;
        position:fixed;
        inset:0;
        background:rgba(0,0,0,.45);
        z-index:24;
      }

      .main{
        padding:14px 14px calc(20px + env(safe-area-inset-bottom));
      }

      .mobileBar{
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:10px;
        position:sticky;
        top:0;
        z-index:12;
        background:rgba(20,20,35,.92);
        backdrop-filter:blur(10px);
        padding:calc(10px + env(safe-area-inset-top)) 0 10px;
        margin-bottom:10px;
      }

      .mobileBar .btn{
        min-width:44px;
        min-height:44px;
        padding:10px 12px;
        flex-shrink:0;
      }

      .mobileBar .brand{
        font-size:18px;
        white-space:nowrap;
        overflow:hidden;
        text-overflow:ellipsis;
      }

      .top{
        gap:12px;
        margin-bottom:14px;
      }

      .top h1{
        font-size:22px;
        line-height:1.25;
        width:100%;
      }

      .toolbar,.row{
        width:100%;
        gap:8px;
      }

      .toolbar .btn,.row .btn{
        min-height:44px;
      }

      .stats,.filters,.grid,.two,.kanban{
        grid-template-columns:1fr;
      }

      .cardTop{
        flex-direction:column;
        align-items:flex-start;
      }

      .actions{
        flex-direction:column;
        align-items:stretch;
      }

      .actions .btn{
        width:100%;
      }

      .modal,.sheet,.lock{
        padding:0;
      }

      .modalIn,.sheetIn,.lockIn{
        width:100%;
        max-width:none;
        max-height:100dvh;
        min-height:100dvh;
        border-radius:0;
        padding:16px;
        padding-top:calc(16px + env(safe-area-inset-top));
        padding-bottom:calc(16px + env(safe-area-inset-bottom));
      }

      .form{
        grid-template-columns:1fr;
      }

      .toastWrap{
        left:12px;
        right:12px;
        top:calc(12px + env(safe-area-inset-top));
        max-width:none;
      }

      .toast{
        min-width:0;
        width:100%;
      }
    }
  </style>
</head>
<body>
  <div id="menuOverlay" class="menuOverlay"></div>
  <div class="toastWrap" id="toastWrap"></div>

  <div class="app">
    <aside class="side" id="sideMenu" aria-label="Yan Menü">
      <div class="brand">HADOLİN CRM</div>
      <div class="subtitle">Portföy ve müşteri yönetimi</div>

      <div class="nav">
        <button class="active" data-page="dashboard" type="button">Dashboard</button>
        <button data-page="portfolios" type="button">Portföy</button>
        <button data-page="customers" type="button">Müşteriler</button>
        <button data-page="matches" type="button">Eşleştirme</button>
        <button data-page="tasks" type="button">Görevler</button>
        <button data-page="history" type="button">Geçmiş</button>
        <button data-page="pipeline" type="button">Pipeline</button>
        <button data-page="backup" type="button">Yedekleme</button>
      </div>
    </aside>

    <main class="main">
      <div class="mobileBar">
        <button class="btn s" id="menuBtn" type="button" aria-label="Menüyü aç">☰</button>
        <div class="brand">HADOLİN CRM</div>
        <button class="btn p" id="mobileQuickAdd" type="button" aria-label="Hızlı ekle">＋</button>
      </div>

      <section class="top">
        <h1 id="pageTitle">Dashboard</h1>
        <div class="toolbar" id="pageActions">
          <button class="btn p" type="button" onclick="openQuickAdd()">Yeni Ekle</button>
        </div>
      </section>

      <section id="page-dashboard" class="pageSection">
        <div class="stats">
          <div class="box">
            <div class="small">Toplam Portföy</div>
            <div class="stat" id="statPortfolio">0</div>
          </div>
          <div class="box">
            <div class="small">Toplam Müşteri</div>
            <div class="stat" id="statCustomer">0</div>
          </div>
          <div class="box">
            <div class="small">Aktif Görev</div>
            <div class="stat" id="statTask">0</div>
          </div>
          <div class="box">
            <div class="small">Eşleşme</div>
            <div class="stat" id="statMatch">0</div>
          </div>
        </div>

        <div class="panel">
          <h3>Genel Bakış</h3>
          <div class="muted">Buraya dashboard özetlerini koy.</div>
        </div>
      </section>

      <section id="page-portfolios" class="pageSection hidden">
        <div class="filters">
          <div>
            <label>Arama</label>
            <input id="portfolioSearch" type="text" placeholder="Başlık, konum, açıklama">
          </div>
          <div>
            <label>Durum</label>
            <select id="portfolioDealFilter">
              <option value="">Tümü</option>
              <option value="Satılık">Satılık</option>
              <option value="Kiralık">Kiralık</option>
            </select>
          </div>
          <div>
            <label>Tür</label>
            <select id="portfolioTypeFilter">
              <option value="">Tümü</option>
              <option value="Daire">Daire</option>
              <option value="Villa">Villa</option>
              <option value="Arsa">Arsa</option>
              <option value="Dükkan">Dükkan</option>
              <option value="Ofis">Ofis</option>
              <option value="Fabrika">Fabrika</option>
              <option value="Ticari (Fabrika/Depo)">Ticari (Fabrika/Depo)</option>
            </select>
          </div>
          <div>
            <label>Etiket</label>
            <select id="portfolioLabelFilter">
              <option value="">Tümü</option>
              <option value="Aktif">Aktif</option>
              <option value="Satıldı">Satıldı</option>
              <option value="Kiralandı">Kiralandı</option>
            </select>
          </div>
        </div>

        <div class="grid" id="portfolioGrid"></div>
        <div class="empty hidden" id="portfolioEmpty">Henüz portföy yok.</div>
      </section>

      <section id="page-customers" class="pageSection hidden">
        <div class="filters">
          <div>
            <label>Arama</label>
            <input id="customerSearch" type="text" placeholder="Ad, telefon, not">
          </div>
          <div>
            <label>Arama Türü</label>
            <select id="customerDealFilter">
              <option value="">Tümü</option>
              <option value="Alıcı">Alıcı</option>
              <option value="Kiracı">Kiracı</option>
            </select>
          </div>
          <div>
            <label>Tür</label>
            <select id="customerTypeFilter">
              <option value="">Tümü</option>
              <option value="Daire">Daire</option>
              <option value="Villa">Villa</option>
              <option value="Arsa">Arsa</option>
              <option value="Dükkan">Dükkan</option>
              <option value="Ofis">Ofis</option>
              <option value="Fabrika">Fabrika</option>
              <option value="Ticari (Fabrika/Depo)">Ticari (Fabrika/Depo)</option>
            </select>
          </div>
          <div>
            <label>Durum</label>
            <select id="customerStatusFilter">
              <option value="">Tümü</option>
              <option value="Aktif">Aktif</option>
              <option value="Pasif">Pasif</option>
              <option value="Tamamlandı">Tamamlandı</option>
            </select>
          </div>
        </div>

        <div class="grid" id="customerGrid"></div>
        <div class="empty hidden" id="customerEmpty">Henüz müşteri yok.</div>
      </section>

      <section id="page-matches" class="pageSection hidden">
        <div class="panel">
          <h3>Eşleştirmeler</h3>
          <div class="stack" id="matchList"></div>
        </div>
      </section>

      <section id="page-tasks" class="pageSection hidden">
        <div class="panel">
          <div class="row" style="justify-content:space-between">
            <h3 style="margin:0">Görevler</h3>
            <button class="btn p" type="button" onclick="openTaskModal()">Yeni Görev</button>
          </div>
          <div class="stack" id="taskList"></div>
        </div>
      </section>

      <section id="page-history" class="pageSection hidden">
        <div class="panel">
          <h3>Geçmiş</h3>
          <div class="stack" id="historyList"></div>
        </div>
      </section>

      <section id="page-pipeline" class="pageSection hidden">
        <div class="kanban" id="pipelineBoard">
          <div class="panel">
            <h3>Yeni</h3>
            <div id="pipe-new"></div>
          </div>
          <div class="panel">
            <h3>Görüşme</h3>
            <div id="pipe-contact"></div>
          </div>
          <div class="panel">
            <h3>Teklif</h3>
            <div id="pipe-offer"></div>
          </div>
          <div class="panel">
            <h3>Kapanış</h3>
            <div id="pipe-close"></div>
          </div>
        </div>
      </section>

      <section id="page-backup" class="pageSection hidden">
        <div class="panel">
          <h3>Yedekleme</h3>
          <div class="row">
            <button class="btn p" type="button" onclick="downloadBackup()">Yedeği İndir</button>
            <button class="btn s" type="button" onclick="document.getElementById('backupFile').click()">Yedek Yükle</button>
            <input id="backupFile" type="file" accept=".json" class="hidden">
          </div>
        </div>
      </section>
    </main>
  </div>

  <div class="modal" id="quickAddModal" aria-hidden="true">
    <div class="modalIn">
      <div class="row" style="justify-content:space-between">
        <h3 style="margin:0">Hızlı Ekle</h3>
        <button class="btn s" type="button" onclick="closeQuickAdd()">Kapat</button>
      </div>

      <div class="form" style="margin-top:12px">
        <div>
          <label>Ne eklemek istiyorsun?</label>
          <select id="quickAddType">
            <option value="portfolio">Portföy</option>
            <option value="customer">Müşteri</option>
            <option value="task">Görev</option>
          </select>
        </div>
      </div>

      <div class="row" style="margin-top:14px;justify-content:flex-end">
        <button class="btn p" type="button" onclick="handleQuickAdd()">Devam Et</button>
      </div>
    </div>
  </div>

  <script>
    const side = document.getElementById('sideMenu');
    const menuBtn = document.getElementById('menuBtn');
    const menuOverlay = document.getElementById('menuOverlay');
    const mobileQuickAdd = document.getElementById('mobileQuickAdd');
    const pageTitle = document.getElementById('pageTitle');
    const quickAddModal = document.getElementById('quickAddModal');
    const quickAddType = document.getElementById('quickAddType');

    function toast(message) {
      const wrap = document.getElementById('toastWrap');
      const el = document.createElement('div');
      el.className = 'toast';
      el.textContent = message;
      wrap.appendChild(el);
      setTimeout(() => el.remove(), 2500);
    }

    function openMenu() {
      if (!side) return;
      side.classList.add('open');
      menuOverlay?.classList.add('show');
      document.body.style.overflow = 'hidden';
    }

    function closeMenu() {
      if (!side) return;
      side.classList.remove('open');
      menuOverlay?.classList.remove('show');
      document.body.style.overflow = '';
    }

    function toggleMenu() {
      if (!side) return;
      if (side.classList.contains('open')) closeMenu();
      else openMenu();
    }

    function switchPage(page) {
      document.querySelectorAll('.pageSection').forEach(el => el.classList.add('hidden'));
      document.getElementById('page-' + page)?.classList.remove('hidden');

      document.querySelectorAll('.nav button').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.page === page);
      });

      const titles = {
        dashboard: 'Dashboard',
        portfolios: 'Portföy',
        customers: 'Müşteriler',
        matches: 'Eşleştirme',
        tasks: 'Görevler',
        history: 'Geçmiş',
        pipeline: 'Pipeline',
        backup: 'Yedekleme'
      };

      pageTitle.textContent = titles[page] || 'Dashboard';

      if (window.innerWidth <= 900) closeMenu();
    }

    function openQuickAdd() {
      quickAddModal?.classList.add('show');
      quickAddModal?.setAttribute('aria-hidden', 'false');
      document.body.style.overflow = 'hidden';
    }

    function closeQuickAdd() {
      quickAddModal?.classList.remove('show');
      quickAddModal?.setAttribute('aria-hidden', 'true');
      document.body.style.overflow = '';
    }

    function handleQuickAdd() {
      const type = quickAddType?.value;
      closeQuickAdd();

      if (type === 'portfolio') {
        switchPage('portfolios');
        toast('Portföy sayfasına geçildi');
        return;
      }

      if (type === 'customer') {
        switchPage('customers');
        toast('Müşteri sayfasına geçildi');
        return;
      }

      if (type === 'task') {
        switchPage('tasks');
        toast('Görev sayfasına geçildi');
      }
    }

    function downloadBackup() {
      toast('Yedek indirme fonksiyonunu mevcut sistemine bağla');
    }

    function openTaskModal() {
      toast('Görev modalını mevcut sistemine bağla');
    }

    menuBtn?.addEventListener('click', toggleMenu);
    menuOverlay?.addEventListener('click', closeMenu);
    mobileQuickAdd?.addEventListener('click', openQuickAdd);

    document.querySelectorAll('.nav button').forEach(btn => {
      btn.addEventListener('click', () => switchPage(btn.dataset.page));
    });

    document.getElementById('backupFile')?.addEventListener('change', e => {
      const file = e.target.files?.[0];
      if (!file) return;
      toast('Yedek seçildi: ' + file.name);
      e.target.value = '';
    });

    quickAddModal?.addEventListener('click', (e) => {
      if (e.target === quickAddModal) closeQuickAdd();
    });

    window.addEventListener('resize', () => {
      if (window.innerWidth > 900) closeMenu();
    });

    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        closeMenu();
        closeQuickAdd();
      }
    });

    switchPage('dashboard');
  </script>
</body>
</html>
